<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ADM Admin Panel</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: sans-serif; background: #050811; color: white; text-align: center; margin: 0; padding: 20px; }
        .card { background: #12182b; padding: 30px 20px; border-radius: 35px; border: 1px solid #50e3c2; max-width: 360px; margin: auto; position: relative; overflow: hidden; }
        .logo-preview { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #50e3c2; margin-bottom: 20px; object-fit: cover; }
        .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; margin-top: 12px; }
        .btn-img { background: #50e3c2; color: #050811; }
        .btn-wa { background: #25D366; color: white; margin-top: 35px; }
        .btn-sms { background: #fff; color: #000; }
        input[type="tel"] { width: 90%; padding: 15px; margin: 10px 0; border-radius: 15px; border: 1px solid #333; background: #000; color: #fff; text-align: center; font-size: 1.2rem; outline: none; }
        #lockScreen { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; border-radius: 35px; z-index: 10; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>
    <div class="card">
        <div id="lockScreen">
            <h2 style="color: #ff4757;">⛔ ACCESS LOCKED</h2>
            <p style="padding: 20px;">භාවිතා කළ හැකි වාර 100,000 සීමාව ඉක්මවා ඇත.</p>
        </div>

        <img id="prev" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="logo-preview">
        <h3 style="margin:0; color:#50e3c2;">ADM ADMIN APP</h3>
        
        <p style="font-size: 0.8rem; margin-top: 20px; opacity:0.7;">ගැලරියෙන් Logo එකක් තෝරන්න</p>
        <input type="file" id="fileInp" accept="image/*" style="display: none;" onchange="handleImage(this)">
        <button class="btn btn-img" onclick="document.getElementById('fileInp').click()">🖼️ CHOOSE FROM GALLERY</button>

        <hr style="opacity: 0.1; margin: 30px 0;">

        <p style="font-size: 0.8rem; opacity: 0.7;">පාරිභෝගිකයාට Card එක යවන්න</p>
        <input type="tel" id="phone" placeholder="07XXXXXXXX" inputmode="numeric" maxlength="10">
        <button class="btn btn-wa" onclick="send('wa')">📲 SEND WHATSAPP</button>
        <button class="btn btn-sms" onclick="send('sms')">💬 SEND SMS</button>
        
        <div style="font-size:0.7rem; color:#ff4757; margin-top:15px;" id="usageInfo">භාවිතය: 0 / 100,000</div>
    </div>

    <script>
        const MAX_LIMIT = 100000;
        window.onload = () => {
            updateUI();
            if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        };
        function handleImage(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    localStorage.setItem('adm_logo_data', e.target.result);
                    document.getElementById('prev').src = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function updateUI() {
            let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
            let savedImg = localStorage.getItem('adm_logo_data');
            document.getElementById('usageInfo').innerText = `භාවිතය: ${count.toLocaleString()} / 100,000`;
            if(savedImg) document.getElementById('prev').src = savedImg;
            if(count >= MAX_LIMIT) document.getElementById('lockScreen').style.display = 'flex';
        }
        function send(mode) {
            let count = parseInt(localStorage.getItem('adm_send_count')) || 0;
            if(count >= MAX_LIMIT) return;
            let num = document.getElementById('phone').value;
            if(num.length < 10) return alert("අංකය පරීක්ෂා කරන්න!");
            localStorage.setItem('adm_send_count', count + 1);
            updateUI();
            let link = window.location.href.replace('admin.html', 'index.html');
            let msg = encodeURIComponent(`ආයුබෝවන්! 👋\nADM Higher Education Digital E-Card එක මෙතනින් ලබාගන්න:\n🔗 ${link}`);
            if(mode === 'wa') {
                let f = num.startsWith('0') ? '94' + num.substring(1) : num;
                window.open(`https://wa.me/${f}?text=${msg}`);
            } else { window.open(`sms:${num}?body=${msg}`); }
        }
    </script>
</body>
</html>
