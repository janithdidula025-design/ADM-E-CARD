<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ADM Digital Card</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0d237d">
    <style>
        :root { --primary: #50e3c2; --accent: #0d237d; --dark: #050811; }
        body { 
            margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, sans-serif; 
            background: linear-gradient(rgba(5, 8, 17, 0.85), rgba(5, 8, 17, 0.85)), 
                        url('https://images.unsplash.com/photo-1523050335456-c98489097d3f?q=80&w=2070&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow: hidden;
        }
        .container { 
            width: 85%; max-width: 400px; background: rgba(255, 255, 255, 0.07); 
            padding: 40px 20px; border-radius: 50px; border: 1px solid rgba(80, 227, 194, 0.3); 
            backdrop-filter: blur(20px); text-align: center; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
        }
        .p-img { width: 140px; height: 140px; border-radius: 50%; object-fit: cover; border: 4px solid var(--primary); margin-bottom: 20px; box-shadow: 0 0 20px rgba(80, 227, 194, 0.4); }
        .institute-name { color: var(--primary); font-weight: bold; letter-spacing: 1.5px; font-size: 1.1rem; margin-bottom: 5px; }
        h2 { margin: 5px 0; font-size: 1.8rem; text-transform: uppercase; }
        .role { opacity: 0.8; font-size: 0.9rem; margin-bottom: 25px; color: #50e3c2; }
        .info-box { background: rgba(0, 0, 0, 0.3); padding: 15px; border-radius: 25px; margin-bottom: 25px; font-size: 0.95rem; line-height: 1.6; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .btn { padding: 16px; border-radius: 20px; border: none; font-weight: bold; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; font-size: 0.9rem; transition: 0.3s; }
        .btn:active { transform: scale(0.95); }
        .btn-call { background: #fff; color: var(--accent); }
        .btn-wa { background: #25D366; color: #fff; }
        .btn-save { background: var(--primary); color: var(--dark); width: 100%; cursor: pointer; font-size: 1rem; }
        @media screen and (max-height: 700px) { .container { padding: 25px 15px; } .p-img { width: 110px; height: 110px; } h2 { font-size: 1.5rem; } }
    </style>
</head>
<body>
    <div class="container">
        <img id="cardLogo" src="https://raw.githubusercontent.com/janithdidula025-design/adm-vcard/main/logo.jpg" class="p-img">
        <div class="institute-name">ADM Higher Education</div>
        <h2>JANITH DIDULA</h2>
        <div class="role">Organizer / Manager</div>
        <div class="info-box">📍 මීගමුව පාර, නාරම්මල<br>📞 0710658051</div>
        <div class="btn-grid">
            <a href="tel:0710658051" class="btn btn-call">📞 CALL</a>
            <a href="https://wa.me/94710658051" class="btn btn-wa">💬 WHATSAPP</a>
        </div>
        <button onclick="saveContact()" class="btn btn-save">👤 SAVE CONTACT</button>
    </div>

    <script>
        // Logo එක පෙන්වීම
        window.onload = () => {
            let saved = localStorage.getItem('adm_logo_data');
            if(saved) document.getElementById('cardLogo').src = saved;
        };

        // Contact Save කිරීම
        function saveContact() {
            const vcardData = `BEGIN:VCARD\nVERSION:3.0\nFN:Janith Didula (ADM)\nORG:ADM Higher Education\nTITLE:Organizer / Manager\nTEL;TYPE=CELL:0710658051\nEND:VCARD`;
            const blob = new Blob([vcardData], { type: 'text/vcard' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'Janith_ADM.vcf'; a.click();
        }

        // Service Worker ලියාපදිංචි කිරීම (App එකක් ලෙස වැඩ කිරීමට මෙය අනිවාර්යයි)
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
